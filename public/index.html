<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numberblocks Math</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsvectormap/dist/css/jsvectormap.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/jsvectormap"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsvectormap/dist/maps/world.js"></script>
</head>
<body>
    <div class="app-container" id="app-wrapper">
        
        <aside id="sidebar" class="sidebar" style="display: none;">
            <div class="sidebar-header">
                <h3>Jugadores</h3>
                <div id="room-info" class="room-badge">PIN: <span id="display-room-code">----</span></div>
            </div>
            
            <ul id="player-list" class="player-list">
                </ul>

            <div id="host-controls" style="display: none; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px;">
                <input type="text" id="new-player-name" placeholder="Nuevo Jugador" style="width: 100%; padding: 8px; border-radius: 5px; border: none; margin-bottom: 10px;">
                <button id="btn-add-player" class="btn-primary" style="width: 100%; font-size: 14px; padding: 8px;">+ Agregar Jugador</button>
                <!-- NUEVO BOTÓN DE TERMINAR JUEGO -->
                <button id="btn-end-game" class="btn-outline" style="width: 100%; font-size: 14px; padding: 8px; margin-top: 10px; background: #E74C3C; color: white; border: none;">🏁 Terminar Juego</button>
            </div>
        </aside>

        <div class="main-content">
            <header class="top-bar">
                <button id="mobile-menu-btn" class="btn-primary" style="display: none; padding: 5px 15px; font-size: 20px;">☰ Jugadores</button>
                
                <h1 class="logo">MathBlocks</h1>
                <div id="identity-display" style="display: none; background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 20px;">
                    <span style="font-weight: bold;">Yo soy: <span id="my-name-text" style="color: #F1C40F;">---</span></span>
                </div>
                <div>
                    <button id="btn-open-stats" class="btn-outline">Estadísticas</button>
                    <button id="btn-leave-room" class="btn-outline" style="background: #E74C3C; color: white; border: none; margin-left: 10px; display: none;">Salir</button>
                </div>
            </header>

            <div class="menu-central" id="game-controls-area" style="display: none;">
                <div class="operation-buttons">
                    <button class="op-btn active" data-op="suma"><span class="op-icon">+</span><span class="op-text">Suma</span></button>
                    <button class="op-btn" data-op="resta"><span class="op-icon">-</span><span class="op-text">Resta</span></button>
                    <button class="op-btn" data-op="multiplicacion"><span class="op-icon">x</span><span class="op-text">Multiplicación</span></button>
                    <button class="op-btn" data-op="division"><span class="op-icon">÷</span><span class="op-text">División</span></button>
                    <button class="op-btn" data-op="banderas"><span class="op-icon">🌍</span><span class="op-text">Banderas</span></button>
                </div>
                <div id="current-player" class="turno-grande">Esperando jugadores...</div>
            </div>

            <main class="operation-display" style="flex-direction: column;">
                
                <div id="flag-container" style="display: none; width: 100%; margin-top: 20px;">
                    <h3 id="flag-continent" style="color: #F1C40F; margin-bottom: 15px; font-size: 20px; text-transform: uppercase; letter-spacing: 2px; text-align: center;"></h3>
                    
                    <div style="display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 20px;">
                        
                        <div style="flex: 1 1 250px; text-align: center;">
                            <img id="flag-image" src="" alt="Bandera" style="height: 180px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 2px solid white; max-width: 100%; object-fit: cover;">
                        </div>
                        
                        <div style="flex: 1 1 250px; height: 180px; background: rgba(255,255,255,0.1); border-radius: 15px; border: 2px solid rgba(255,255,255,0.3); overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
                            <div id="world-map" style="width: 100%; height: 100%;"></div>
                        </div>
                        
                    </div>

                    <h2 id="correct-country-name" style="display: none; color: #2ECC71; font-size: 32px; margin-top: 20px; font-weight: bold; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); text-align: center;"></h2>
                </div>

                <div id="math-container" style="display: flex; justify-content: center; align-items: center; gap: 15px; width: 100%;">
                    <div class="number-block" id="math-box-1">
                        <span id="num1" class="huge-number">0</span>
                        <img id="img-num1" src="" class="nb-image" style="display: none;">
                    </div>
                    
                    <div class="operator-block" id="math-box-op"><span id="operator" class="huge-number">+</span></div>
                    
                    <div class="number-block" id="math-box-2">
                        <span id="num2" class="huge-number">0</span>
                        <img id="img-num2" src="" class="nb-image" style="display: none;">
                    </div>
                    
                    <div class="operator-block" id="equals-block" style="display: none;"><span class="huge-number">=</span></div>
                    
                    <div class="number-block" id="result-block" style="display: none;">
                        <span id="result-num" class="huge-number">0</span>
                        <img id="img-result" src="" class="nb-image" style="display: none;">
                    </div>
                </div>

            </main>

            <footer class="interaction-card">
                <h2>¿Cuál es el resultado?</h2>
                <div class="input-group">
                    <input type="number" id="answer-input" placeholder="Escribe aquí" autocomplete="off" disabled>
                    <button id="verify-btn" class="btn-primary" disabled>Verificar</button>
                    <button id="idk-btn" class="btn-outline" style="background: #F39C12; color: white; border: none;" disabled>No lo sé 🤔</button>
                </div>
                <div id="feedback-message" class="feedback"></div>
            </footer>
        </div>
    </div>

    <div id="welcome-modal" class="modal active">
        <div class="modal-content" style="text-align: center;">
            <h2 style="font-size: 30px; color: #2980B9;">🎮 MathBlocks</h2>
            <button id="btn-show-create" class="btn-primary" style="width: 100%; margin-bottom: 15px;">Crear Nuevo Juego</button>
            <button id="btn-show-join" class="btn-outline" style="width: 100%; color: #333; background: #eee;">Unirme a un Juego</button>
        </div>
    </div>

    <div id="join-modal" class="modal">
        <div class="modal-content" style="text-align: center;">
            <h2>Unirse al Juego</h2>
            <input type="text" id="join-code-input" placeholder="PIN de 8 dígitos" style="width: 100%; padding: 15px; font-size: 20px; text-align: center; border-radius: 10px; border: 2px solid #ddd; margin-bottom: 20px; text-transform: uppercase;">
            <button id="btn-join-game" class="btn-primary" style="width: 100%; margin-bottom: 10px;">Buscar Sala</button>
            <button id="btn-back-from-join" class="btn-outline" style="width: 100%; color: #333; background: transparent; border: none;">Volver</button>
        </div>
    </div>

    <div id="identity-modal" class="modal">
        <div class="modal-content" style="text-align: center;">
            <h2>¿Quién eres?</h2>
            <p>Selecciona tu nombre para entrar a la partida:</p>
            <div id="available-players-container" style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
                </div>
        </div>
    </div>

    <div id="setup-modal" class="modal">
        <div class="modal-content">
            <h2>⚙️ Configuración</h2>
            <div class="setup-group"><label>Límite Sumas:</label><input type="number" id="limit-suma-input" value="10"></div>
            <div class="setup-group"><label>Límite Restas:</label><input type="number" id="limit-resta-input" value="10"></div>
            <div class="setup-group"><label>¿Cuántos juegan?</label><input type="number" id="num-players-input" min="1" max="5" value="1"></div>
            <div id="names-container" class="setup-group"></div>
            <button id="btn-start-game" class="btn-primary" style="width: 100%; margin-top: 15px;">¡Crear Sala!</button>
            <button id="btn-back-from-setup" class="btn-outline" style="width: 100%; margin-top: 10px; color: #333; background: transparent; border: none;">Cancelar</button>
        </div>
    </div>

    <div id="stats-modal" class="modal"><div class="modal-content stats-content"><h2>🏆 Estadísticas</h2><div id="stats-container"></div><div class="modal-actions"><button id="btn-close-stats" class="btn-outline" style="color: #333; background: #eee;">Cerrar</button></div></div></div>

    <!-- MODAL DEL PODIO -->
    <div id="podium-modal" class="modal">
        <div class="modal-content" style="text-align: center; max-width: 600px; background: #fff; border-top: 10px solid #F1C40F;">
            <h2 style="font-size: 36px; color: #F39C12; margin-bottom: 10px;">🏆 ¡Gran Final! 🏆</h2>
            <p style="color: #666; margin-bottom: 25px;">Estos son los mejores jugadores de la partida:</p>
            
            <div id="podium-container" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 25px;">
                <!-- Aquí aparecerán los ganadores inyectados por JavaScript -->
            </div>
            
            <button onclick="window.location.reload()" class="btn-primary" style="width: 100%; font-size: 18px;">Volver al Menú Principal</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
